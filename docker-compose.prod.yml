# Kankaverse — PRODUCTION (VPS, tam self-host)
# Çalıştır:  docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
# Servisler: postgres + redis (yalnız iç ağ, host'a AÇILMAZ) · api · web (static) · caddy (edge, otomatik TLS)
# Ağır yük dışarıda: ses/video = LiveKit Cloud · dosya = R2/MinIO (UPLOADS_ENABLED açılınca)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports YOK — yalnız iç compose ağından erişilir (güvenlik). Host'tan erişim: docker compose exec.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    # ports YOK — iç ağ
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ports YOK — Caddy iç ağdan api:3000'e proxy'ler

  web:
    build:
      context: ./web
      args:
        # Build-time API URL — Vite gömer. Kendi domain'ine göre değiştir.
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    # ports YOK — Caddy iç ağdan web:80'e proxy'ler

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # ACME sertifikaları burada kalıcı (yeniden yaratma)
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
