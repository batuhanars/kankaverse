# Kankaverse — yerel geliştirme altyapısı (PostgreSQL + Redis)
# Kullanım:  cp .env.example .env   →   docker compose up -d
# Durdur:    docker compose down   (veri korunur)   |   down -v (veriyi de sil)

services:
  postgres:
    image: postgres:16-alpine
    container_name: kankaverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kankaverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kankaverse_dev}
      POSTGRES_DB: ${POSTGRES_DB:-kankaverse}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kankaverse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kankaverse} -d ${POSTGRES_DB:-kankaverse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kankaverse-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - kankaverse_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kankaverse_pgdata:
  kankaverse_redisdata:
