# Web container iç nginx'i — yalnız statik SPA servis eder (TLS edge'de Caddy'de).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: bilinmeyen yollar index.html'e düşer (vue-router history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hash'li asset'ler uzun cache (Vite içerik-hash üretir)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html cache'lenmez (yeni deploy anında görünür)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
