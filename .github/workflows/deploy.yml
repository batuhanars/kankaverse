name: Deploy to VPS

# main'e her push'ta (ve elle tetiklemeyle) VPS'teki self-hosted runner deploy eder.
# Runner VPS'te çalışır → GitHub'a DIŞARI bağlanır (inbound SSH YOK; yurtdışı IP'lerden
# SSH'ın düşürülmesi / fail2ban-geo sorunu bu modelde yaşanmaz).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Aynı anda tek deploy çalışsın.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted]
    steps:
      # actions/checkout YOK — mevcut /root/kankaverse klonu üzerinde çalışıyoruz
      # (.env.production orada; runner'ın _work klasörüne checkout istemiyoruz).
      - name: Deploy (yerel — git pull + compose up)
        run: |
          set -e
          cd /home/deploy/kankaverse
          git pull origin main
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
          docker image prune -f
