name: Deploy to VPS

# main'e her push'ta (ve elle tetiklemeyle) VPS'teki self-hosted runner deploy eder.
# Runner VPS'te çalışır → GitHub'a DIŞARI bağlanır (inbound SSH YOK; yurtdışı IP'lerden
# SSH'ın düşürülmesi / fail2ban-geo sorunu bu modelde yaşanmaz).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Aynı anda tek deploy çalışsın.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

# Repo private → git pull GITHUB_TOKEN ile kimlik doğrular (aşağıda extraheader).
permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted]
    steps:
      # actions/checkout YOK — mevcut /root/kankaverse klonu üzerinde çalışıyoruz
      # (.env.production orada; runner'ın _work klasörüne checkout istemiyoruz).
      - name: Deploy (yerel — git pull + compose up)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          cd /home/deploy/kankaverse
          BEFORE=$(git rev-parse HEAD)
          # Repo private: https remote anonim pull edemiyor. Token'ı geçici Authorization
          # header'ı ile ver (URL'e gömme → ps/reflog sızıntısı yok). actions/checkout deseni.
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git -c http.extraheader="$AUTH_HEADER" pull origin main
          AFTER=$(git rev-parse HEAD)
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
          # Caddyfile bind-mount: up -d caddy'yi yeniden YARATMAZ + `caddy reload` çalışan sürece
          # uygulamayabilir → Caddyfile değiştiyse konteyneri restart et (dosyayı sıfırdan okur).
          if git diff --name-only "$BEFORE" "$AFTER" | grep -q '^Caddyfile$'; then
            echo "Caddyfile değişti → caddy restart"
            docker compose --env-file .env.production -f docker-compose.prod.yml restart caddy
          fi
          docker image prune -f
