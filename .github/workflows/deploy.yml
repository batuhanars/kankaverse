name: Deploy to VPS

# main'e her push'ta (ve elle tetiklemeyle) VPS'e SSH ile bağlanıp
# kodu çeker, imajları yeniden derler ve servisleri günceller.
# Secret'lar: VPS_HOST, VPS_PORT, VPS_USER, VPS_SSH_KEY (repo → Settings → Secrets → Actions)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Aynı anda tek deploy çalışsın; yeni push gelirse öncekini iptal et.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Komut başarısız olursa (pull/build) job da başarısız olsun.
          script_stop: true
          command_timeout: 20m
          script: |
            cd ~/kankaverse
            git pull origin main
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
            docker image prune -f
