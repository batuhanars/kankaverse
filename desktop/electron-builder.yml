# electron-builder paketleme yapılandırması
# v1 hedefi: Windows NSIS installer.
# Mac (dmg) ve Linux (AppImage) config hazır; build edilmedi (cross-build sonraya).

appId: com.kankaverse.desktop
productName: Kankaverse

directories:
  output: dist

files:
  - src/**/*
  - build/icon.png

# ── Windows (NSIS installer) ─────────────────────────────────────────────────
win:
  target: nsis
  icon: build/icon.png
  # electron-builder PNG → .ico dönüşümü otomatik yapar (Electron 36+)

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Kankaverse

# ── macOS (dmg) ──────────────────────────────────────────────────────────────
# Build: npm run dist -- --mac (v1 Windows önce; cross-build sonraya)
mac:
  target: dmg
  icon: build/icon.png
  category: public.app-category.social-networking

dmg:
  title: Kankaverse

# ── Linux (AppImage) ─────────────────────────────────────────────────────────
# Build: npm run dist -- --linux (v1 Windows önce)
linux:
  target: AppImage
  icon: build/icon.png
  category: Network
